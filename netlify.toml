[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/parse-statement"
  to = "/.netlify/functions/parse-statement"
  status = 200

[[redirects]]
  from = "/api/analyze"
  to = "/.netlify/functions/analyze"
  status = 200

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
